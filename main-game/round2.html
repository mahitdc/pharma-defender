<style>

0%{transform:scale(1);color:#3a2438;text-shadow:none;}

}

    .tBtn { width: 50px; height: 50px; font-size: 8px; }

    left: 10px;

    #phraseReveal { font-size: 16px; margin: 8px 0; letter-spacing: 3px; }

<script>
(function(){
"use strict";

/* ================================================================
GOOGLE SHEETS TOURNAMENT LINK
================================================================ */
var GOOGLE_SHEET_URL = "PASTE_YOUR_WEB_APP_URL_HERE";


/* ================================================================
GLOBAL ERROR BOUNDARY
================================================================ */
var errBanner=null;
function safeErrBanner(msg){
try{
if(!errBanner) errBanner=document.getElementById('errBanner');
if(errBanner){ errBanner.textContent='ERR: '+String(msg).slice(0,80); errBanner.style.display='block';
setTimeout(function(){ try{errBanner.style.display='none';}catch(e){} },3000); }
}catch(e){}
}
window.onerror=function(msg,src,line,col,err){
console.error('[JE ERROR]',msg,'line:',line,err);
safeErrBanner(String(msg).slice(0,80));
return true;
};
window.addEventListener('unhandledrejection',function(ev){
console.error('[JE PROMISE]',ev.reason);
safeErrBanner('async err');
try{ ev.preventDefault(); }catch(e){}
});
function safe(fn,fallback){
try{ return fn(); }catch(e){ console.error('[safe]',e); safeErrBanner(e&&e.message?e.message:'err'); return fallback; }
}

/* ================================================================
COMPACT UTIL
================================================================ */
function compact(arr,keepFn){
var w=0;
for(var r=0;r<arr.length;r++){
var item=arr[r];
if(item&&keepFn(item)){ if(w!==r) arr[w]=item; w++; }
}
arr.length=w;
return arr;
}

/* ================================================================
CANVAS SETUP
================================================================ */
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d',{alpha:false});
var BW=960,BH=540,DPR=1;
function resizeCanvas(){
safe(function(){
DPR=0.65;
var aw=window.innerWidth,ah=window.innerHeight;
canvas.style.width=aw+'px'; canvas.style.height=ah+'px';
canvas.style.left='0px'; canvas.style.top='0px';
canvas.width=Math.round(aw*DPR); canvas.height=Math.round(ah*DPR);
ctx.setTransform(1,0,0,1,0,0);
skyGradCache=null; leftTreeCache=null; rightTreeCache=null; mistCache=null;
buildTreeCaches();
});
}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',function(){ setTimeout(resizeCanvas,200); });
function applyVirtualScale(){ var sx=canvas.width/BW; var sy=canvas.height/BH; ctx.setTransform(sx,0,0,sy,0,0); }

/* ================================================================
DAWN AUDIO ENGINE (Web Audio API)
-- Organic jungle ambient: filtered white-noise wind with slow
automation curve, deep tribal hand-drums (triangle wave rapid
exponential decay), resonant wooden chime chords for pickups.
================================================================ */
var audioCtx=null;
var ambientOn=false;
var ambientMaster=null;
var ambientNodes=[];
var drumLoopHandle=null,shimmerLoopHandle=null;
var beeBuzzNodes=[];

function ensureAudio(){
safe(function(){
if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==='suspended') audioCtx.resume().catch(function(){});
});
}

function rampGain(g,target,t,now){
g.gain.cancelScheduledValues(now);
g.gain.setValueAtTime(Math.max(0.0001,g.gain.value),now);
g.gain.linearRampToValueAtTime(target,now+t);
}

/* Resonant wooden chime tone -- used for all item pickups */
function playChimeTone(f,startOffset,dur,vol,type){
if(!audioCtx) return;
safe(function(){
var now=audioCtx.currentTime+startOffset;
var o=audioCtx.createOscillator();
var g=audioCtx.createGain();
var filt=audioCtx.createBiquadFilter();
filt.type='lowpass'; filt.frequency.value=f*3.2; filt.Q.value=0.6;
o.type=type||'sine'; o.frequency.value=f;
g.gain.setValueAtTime(0.0001,now);
g.gain.linearRampToValueAtTime(vol,now+Math.min(0.02,dur*0.18));
g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
o.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
o.start(now); o.stop(now+dur+0.05);
});
}

/* Wooden chime chord -- coin pickup */
function sfxCoinRing(){
if(!audioCtx) return;
safe(function(){
var chord=[1046.5,1318.5,1568.0];
chord.forEach(function(f,i){ playChimeTone(f,i*0.018,0.42,0.085,'triangle'); });
playChimeTone(2093.0,0.05,0.30,0.045,'sine');
});
}

/* Bright resonant chime chord -- diamond pickup */
function sfxDiamondChime(){
if(!audioCtx) return;
safe(function(){
var chord=[784.0,987.8,1174.7,1480.0];
chord.forEach(function(f,i){ playChimeTone(f,i*0.03,0.62,0.075,'sine'); });
playChimeTone(392.0,0,0.5,0.05,'triangle');
});
}

function sfxLetter(){ playChimeTone(880,0,0.28,0.08,'sine'); playChimeTone(1318.5,0.07,0.34,0.07,'sine'); }

function sfxPhraseComplete(){
[523.25,659.25,784.0,987.8,1318.5].forEach(function(f,i){ playChimeTone(f,i*0.085,0.5,0.08,'triangle'); });

function sfxCrownChime(){
[880,1108.7,1318.5,1568,2093].forEach(function(f,i){ playChimeTone(f,i*0.10,0.7,0.07,'sine'); });
}

playChimeTone(480,0,0.26,0.075,'triangle');
playChimeTone(660,0.10,0.26,0.075,'triangle');
playChimeTone(880,0.20,0.40,0.08,'triangle');

playChimeTone(659.25,0.05,0.36,0.06,'sine');

function sfxGrowth(){
if(!audioCtx) return;
safe(function(){
var now=audioCtx.currentTime;
var o=audioCtx.createOscillator(); var g=audioCtx.createGain();
o.type='triangle'; o.frequency.setValueAtTime(160,now);
o.frequency.exponentialRampToValueAtTime(420,now+0.5);
g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.09,now+0.08);
g.gain.exponentialRampToValueAtTime(0.0001,now+0.55);
o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+0.6);
});
}

function sfxShrink(){
if(!audioCtx) return;
safe(function(){
var now=audioCtx.currentTime;
var o=audioCtx.createOscillator(); var g=audioCtx.createGain();
o.type='triangle'; o.frequency.setValueAtTime(620,now);
o.frequency.exponentialRampToValueAtTime(220,now+0.45);
g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.09,now+0.06);
g.gain.exponentialRampToValueAtTime(0.0001,now+0.5);
o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+0.55);
});
}

function sfxJump(){ playChimeTone(360,0,0.14,0.05,'triangle'); }

function sfxLaser(){
if(!audioCtx) return;
safe(function(){
var now=audioCtx.currentTime;
var o=audioCtx.createOscillator(); var g=audioCtx.createGain(); var f=audioCtx.createBiquadFilter();

o.frequency.exponentialRampToValueAtTime(500,now+0.09);
g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.06,now+0.01);

o.connect(f); f.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+0.12);
});

function sfxBeehive(){
if(!audioCtx) return;
safe(function(){
var now=audioCtx.currentTime;
var o1=audioCtx.createOscillator(); var g1=audioCtx.createGain();
o1.type='sine'; o1.frequency.setValueAtTime(1100,now);
o1.frequency.linearRampToValueAtTime(1900,now+0.16);

function shuffleArr(a){
for(var i=a.length-1;i>0;i--){
var j=Math.floor(Math.random()*(i+1));
var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
}
}

function shuffleAll(){
G.questionsShuffle=[].concat(QUESTIONS); shuffleArr(G.questionsShuffle);
}

/* ================================================================
SHARED NOISE HELPER -- deterministic per-call pseudo-noise used to
perturb stroke paths so foliage/bark/grass reads as organic rather
than smooth vector fills. [K5]

function noiseRng(seed){ var s=(seed||1)>>>0; return function(){ s=(s*1664525+1013904223)>>>0; return (s&0xfffffff)/0xfffffff; }; }

/* [K5] Organic bark rendering: layered linear+radial gradients with
deep bark/shadow hues (#4A3B32, #2B1E17), plus per-strand noise-
perturbed vertical fissure strokes so the trunk silhouette reads as
rough fibrous wood rather than a flat vector fill. */
function drawBarkTrunk(cc,trunkCX,trunkW,trunkTop,H,isLeft,seed){
var rngBark=noiseRng(seed);
/* Base trunk silhouette uses a wide multi-stop gradient anchored on
the requested deep bark tones, layered over the prior warm-brown
palette so dawn light still grazes the right edge. */
var tg=cc.createLinearGradient(trunkCX-trunkW/2,0,trunkCX+trunkW/2,0);
tg.addColorStop(0,'#1c130a');
tg.addColorStop(0.16,'#2B1E17');
tg.addColorStop(0.40,'#4A3B32');
tg.addColorStop(0.62,'#5a4530');
tg.addColorStop(0.84,'#3a2812');
tg.addColorStop(1,'#150d05');
cc.fillStyle=tg;
cc.beginPath();
if(isLeft){
cc.moveTo(trunkCX-trunkW*0.62,H);
cc.bezierCurveTo(trunkCX-trunkW*0.68,H*0.55,trunkCX-trunkW*0.40,H*0.30,trunkCX-trunkW*0.22,trunkTop);
cc.lineTo(trunkCX+trunkW*0.55,trunkTop+8);
cc.bezierCurveTo(trunkCX+trunkW*0.50,H*0.32,trunkCX+trunkW*0.60,H*0.58,trunkCX+trunkW*0.68,H);
} else {
cc.moveTo(trunkCX+trunkW*0.62,H);
cc.bezierCurveTo(trunkCX+trunkW*0.68,H*0.55,trunkCX+trunkW*0.40,H*0.30,trunkCX+trunkW*0.22,trunkTop);
cc.lineTo(trunkCX-trunkW*0.55,trunkTop+8);
cc.bezierCurveTo(trunkCX-trunkW*0.50,H*0.32,trunkCX-trunkW*0.60,H*0.58,trunkCX-trunkW*0.68,H);
}
cc.closePath(); cc.fill();

cc.save(); cc.clip();

/* Radial knot-shadow patches: irregular dark radial blotches that
break up the flat fill the way real bark scarring does. */
var knotCount=6;
for(var kk=0;kk<knotCount;kk++){
var ky=trunkTop+30+rngBark()*(H-trunkTop-60);
var kx=trunkCX+(rngBark()-0.5)*trunkW*0.7;
var kr=10+rngBark()*22;
var kg=cc.createRadialGradient(kx,ky,1,kx,ky,kr);
kg.addColorStop(0,'rgba(21,13,5,0.55)');
kg.addColorStop(0.5,'rgba(43,30,23,0.30)');
kg.addColorStop(1,'rgba(43,30,23,0)');
cc.fillStyle=kg;
cc.beginPath(); cc.ellipse(kx,ky,kr*0.7,kr,rngBark()*Math.PI,0,Math.PI*2); cc.fill();
}

/* Dense noise-perturbed vertical fissure strokes -- each one wanders
slightly via small per-segment jitter rather than a single smooth
bezier, producing a fibrous, non-cartoon bark texture. */
var fissureCount=16;
for(var bk=0;bk<fissureCount;bk++){
var bkx=trunkCX+(isLeft?-trunkW*0.46:trunkW*0.46)+bk*(trunkW*0.92/fissureCount)*(isLeft?1:-1);
var segs=9;
var jitterAmp=3.2+rngBark()*2.2;
cc.beginPath();
var curX=bkx,curY=H;
cc.moveTo(curX,curY);
for(var sgi=1;sgi<=segs;sgi++){
var py=H-(sgi/segs)*(H-trunkTop-20);
var px=bkx+Math.sin(sgi*1.7+bk*0.9)*jitterAmp+(rngBark()-0.5)*jitterAmp*1.4;
cc.lineTo(px,py);
curX=px; curY=py;
}
var darkness=0.22+rngBark()*0.28;
cc.strokeStyle='rgba(12,7,3,'+darkness.toFixed(3)+')';
cc.lineWidth=1+rngBark()*1.6;
cc.stroke();
/* Thin highlight sliver just beside each fissure -- catches dawn light */
cc.beginPath();
cc.moveTo(curX+1.4,H);
for(var sgi2=1;sgi2<=segs;sgi2++){
var py2=H-(sgi2/segs)*(H-trunkTop-20);
var px2=bkx+1.6+Math.sin(sgi2*1.7+bk*0.9)*jitterAmp+(rngBark()-0.5)*jitterAmp*1.4;
cc.lineTo(px2,py2);
}
cc.strokeStyle='rgba(122,92,58,'+(0.10+rngBark()*0.10).toFixed(3)+')';
cc.lineWidth=0.8;
cc.stroke();
}

/* Horizontal bark plate breaks -- short irregular ridges */
var plateRows=10;
for(var pr=0;pr<plateRows;pr++){
var ry=trunkTop+20+(pr/plateRows)*(H-trunkTop-40)+rngBark()*10;
var segCount=3+Math.floor(rngBark()*3);
for(var sgc=0;sgc<segCount;sgc++){
var rx0=trunkCX+(isLeft?-trunkW*0.5:-trunkW*0.06)+rngBark()*trunkW*0.56*(isLeft?1:1);
var rw=8+rngBark()*16;
cc.strokeStyle='rgba(8,5,2,'+(0.14+rngBark()*0.16).toFixed(3)+')';
cc.lineWidth=1+rngBark()*1.2;
cc.beginPath();
cc.moveTo(rx0,ry);
cc.quadraticCurveTo(rx0+rw*0.5,ry+2+rngBark()*3,rx0+rw,ry-1+rngBark()*3);
cc.stroke();
}
}

cc.restore();

/* Soft ambient occlusion along the inner curve to seat the trunk
against the canopy above it. */
var aoGrad=cc.createLinearGradient(trunkCX-trunkW*0.7,0,trunkCX+trunkW*0.7,0);
aoGrad.addColorStop(0,'rgba(8,5,2,0.30)');
aoGrad.addColorStop(0.5,'rgba(8,5,2,0)');
aoGrad.addColorStop(1,'rgba(8,5,2,0.30)');
cc.save(); cc.globalCompositeOperation='multiply'; cc.fillStyle=aoGrad;
cc.beginPath();
if(isLeft){
cc.moveTo(trunkCX-trunkW*0.62,H);
cc.bezierCurveTo(trunkCX-trunkW*0.68,H*0.55,trunkCX-trunkW*0.40,H*0.30,trunkCX-trunkW*0.22,trunkTop);
cc.lineTo(trunkCX+trunkW*0.55,trunkTop+8);
cc.bezierCurveTo(trunkCX+trunkW*0.50,H*0.32,trunkCX+trunkW*0.60,H*0.58,trunkCX+trunkW*0.68,H);
} else {
cc.moveTo(trunkCX+trunkW*0.62,H);
cc.bezierCurveTo(trunkCX+trunkW*0.68,H*0.55,trunkCX+trunkW*0.40,H*0.30,trunkCX+trunkW*0.22,trunkTop);
cc.lineTo(trunkCX-trunkW*0.55,trunkTop+8);
cc.bezierCurveTo(trunkCX-trunkW*0.50,H*0.32,trunkCX-trunkW*0.60,H*0.58,trunkCX-trunkW*0.68,H);
}
cc.closePath(); cc.fill();
cc.restore();
}

/* [K5] Organic canopy foliage: instead of smooth radial-gradient
blobs, each cluster is built from many small noise-jittered leaf
dabs with irregular edges, layered dark-to-light, so the silhouette
reads as a mass of individual leaves rather than a flat cartoon
puff. Palette stays locked to #2D5A27 / #417136 per [J6]. */
function drawFoliageCluster(cc,cl,seedBase){
var rng2=noiseRng(seedBase);
/* Underlayer: soft dark mass establishes overall silhouette */
var baseGrad=cc.createRadialGradient(cl.cx-cl.rx*0.15,cl.cy-cl.ry*0.15,2,cl.cx,cl.cy,Math.max(cl.rx,cl.ry));
baseGrad.addColorStop(0,'rgba(65,113,54,0.55)');
baseGrad.addColorStop(0.6,'rgba(45,90,39,0.42)');
baseGrad.addColorStop(1,'rgba(28,64,24,0)');
cc.fillStyle=baseGrad;
cc.beginPath(); cc.ellipse(cl.cx,cl.cy,cl.rx,cl.ry,0,0,Math.PI*2); cc.fill();

/* Leaf-dab layer: many small irregular ellipses/teardrops with
randomized rotation and slightly varied moss tones, overlapping
densely to break up any smooth edge. */
var dabCount=cl.n*7;
for(var di=0;di<dabCount;di++){
var ang=rng2()*Math.PI*2;
var rad=Math.pow(rng2(),0.62);
var dx=cl.cx+Math.cos(ang)*cl.rx*rad;
var dy=cl.cy+Math.sin(ang)*cl.ry*rad;
var leafLen=3.5+rng2()*6.5;
var leafW=1.6+rng2()*3.0;
var rot=rng2()*Math.PI*2;
var toneRoll=rng2();
var leafColor;
if(toneRoll<0.30) leafColor='rgba(92,158,72,';
else if(toneRoll<0.66) leafColor='rgba(65,113,54,';
else leafColor='rgba(45,90,39,';
var edgeFalloff=1-rad;
var alpha=(0.35+rng2()*0.45)*Math.max(0.25,edgeFalloff);
cc.save();
cc.translate(dx,dy); cc.rotate(rot);
cc.fillStyle=leafColor+alpha.toFixed(3)+')';
cc.beginPath();
cc.moveTo(0,-leafLen*0.5);
cc.quadraticCurveTo(leafW,0,0,leafLen*0.5);
cc.quadraticCurveTo(-leafW,0,0,-leafLen*0.5);
cc.closePath(); cc.fill();
cc.restore();
}

/* Sparse bright fleck pass -- catches dawn light on leaf edges */
var fleckCount=Math.floor(cl.n*1.6);
for(var fi=0;fi<fleckCount;fi++){
var fang=rng2()*Math.PI*2;
var frad=Math.pow(rng2(),0.8)*0.85;
var fx=cl.cx+Math.cos(fang)*cl.rx*frad;
var fy=cl.cy+Math.sin(fang)*cl.ry*frad;
cc.fillStyle='rgba(150,205,120,'+(0.10+rng2()*0.16).toFixed(3)+')';
cc.beginPath(); cc.ellipse(fx,fy,1.1+rng2()*1.6,0.6+rng2()*1.0,rng2()*Math.PI,0,Math.PI*2); cc.fill();
}
}

];
clusters.forEach(function(cl,ci){

/* Bright fringe highlights -- kept as a final organic dab pass */
var brightCX=isLeft?W*1.0:W*0.0;

drawFoliageCluster(cc,{cx:bx3,cy:by3,rx:W*0.11+rngB()*W*0.09,ry:H*0.07+rngB()*H*0.06,n:4},2500+bg2*53);
}

rimGrad.addColorStop(1,'rgba(255,210,165,0.15)');

cc.fillRect(0,0,W,H*0.5);
});
}

function findNearestMicrobe(){

/* Rock geometry for platform edges */
function seededRng(seed){ var s=seed||1; return function(){ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }

function buildRockCluster(seed,edgeWidth){
var rng=seededRng(seed);
var rocks=[]; var count=3+Math.floor(rng()*3);
for(var i=0;i<count;i++){
rocks.push({ox:rng()*edgeWidth*0.7,oy:-(rng()*10),r:7+rng()*9,jag:0.55+rng()*0.35,rot:rng()*Math.PI*2,pts:5+Math.floor(rng()*3)});
}
return rocks;
}

function drawRockShape(cx,cy,rock){
var sides=rock.pts;
ctx.beginPath();
for(var i=0;i<=sides;i++){
var ang=rock.rot+(i/sides)*Math.PI*2;
var rad=rock.r*(1-rock.jag*0.5+Math.sin(i*2.7+rock.rot)*rock.jag*0.5);
var px=cx+Math.cos(ang)*rad; var py=cy+Math.sin(ang)*rad*0.78;
if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
}
ctx.closePath();
}

function drawRockCluster(rocks,edgeX,baseY,mirrored){
    for(var i=0;i<rocks.length;i++){
        var rk=rocks[i];
        var cx=mirrored?edgeX-rk.ox:edgeX+rk.ox;
        var cy=baseY+rk.oy;
        ctx.save();
        
        /* PERFORMANCE FIX: Swap heavy Radial Gradient for a solid dark stone color */
        ctx.fillStyle='#4A3B32'; 
        
        drawRockShape(cx,cy,rk); ctx.fill();
        ctx.strokeStyle='rgba(20,16,12,0.55)'; ctx.lineWidth=1.2; ctx.stroke();
        ctx.fillStyle='rgba(0,0,0,0.30)';
        ctx.beginPath(); ctx.ellipse(cx+(mirrored?-rk.r*0.3:rk.r*0.3),cy+rk.r*0.55,rk.r*0.85,rk.r*0.22,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

/* [K5] Blade-by-blade organic grass renderer for mossy/stone platform
tops. Builds a deterministic per-platform blade field (cached on the
platform object the first time it is drawn) using alternating soft
green strokes with subtle height/width/lean variation, rather than a
flat green rectangle/block. */
function buildGrassField(seed,widthPx){
var rng=seededRng(seed);
var blades=[];
var bladeSpacing=2.6;
var count=Math.max(6,Math.floor(widthPx/bladeSpacing));
var palette=['#3B6B2F','#264A1E','#4E8042'];
for(var i=0;i<count;i++){
var bx=(i+0.5)*bladeSpacing+(rng()-0.5)*1.4;
var h=5+rng()*7;
var lean=(rng()-0.5)*3.2;
var w=0.9+rng()*0.9;
var colorRoll=rng();
var color=colorRoll<0.4?palette[0]:(colorRoll<0.75?palette[1]:palette[2]);
blades.push({bx:bx,h:h,lean:lean,w:w,color:color});
}
return blades;
}

function drawGrassField(p){
    if(!p.grassField) p.grassField=buildGrassField(p.rockSeed||1,p.w);
    var blades=p.grassField;
    ctx.save();
    ctx.beginPath(); /* PERFORMANCE FIX: Batch all grass into ONE single path */
    for(var i=0;i<blades.length;i++){
        var bl=blades[i];
        var bx=p.x+bl.bx;
        var baseY=p.y+1;
        ctx.moveTo(bx,baseY);
        ctx.lineTo(bx+bl.lean*0.6, baseY-bl.h); /* Straight lines are 10x cheaper than curves */
    }
    ctx.strokeStyle='#3B6B2F'; 
    ctx.lineWidth=1.5;
    ctx.lineCap='round';
    ctx.stroke(); /* Stroke exactly once per platform, instead of 40 times! */
    ctx.restore();
}

function drawPlatform(p){
if(!p) return;
safe(function(){
ctx.save();
switch(p.type){
case 'stone':{
    var sg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    sg.addColorStop(0,'#7a7268'); sg.addColorStop(0.4,'#5a564c'); sg.addColorStop(1,'#34302a');
    ctx.fillStyle=sg; ctx.fillRect(p.x,p.y,p.w,p.h);
    
    /* PERFORMANCE FIX: Removed the massive RNG loop that drew tiny rectangles every frame */
    ctx.fillStyle='rgba(0,0,0,0.15)';

function updateFloatingTexts(dt){

if(f.life<=0) floatingTexts.splice(i,1);

function updateParticles(dt){
for(var i=particles.length-1;i>=0;i--){
var p=particles[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt;

}
}

answer OR the timer reaching 0 instantly clears the current

/* ================================================================
BEEHIVE TRIVIA CHALLENGE
[J11/J12] Strict universal 25.00s countdown timer. Three speed
tiers determine the score multiplier on a CORRECT answer:
Tier 1 (fastest)  -- answered within 5.00s elapsed  -> 2.00x
Tier 2 (medium)   -- answered 5.01s to 10.00s elapsed -> 1.75x
Tier 3 (standard) -- answered after 10.00s elapsed   -> 1.50x
Score awarded = multiplier * 10 * current coins collected.
A WRONG answer OR the 25.00s timer reaching 0 awards exactly 0
points. The pop-up closes after a brief click-feedback flash in
either failure case -- NO new question is generated and normal
gameplay resumes shortly after (single-chance only).
[K2] Clicking an answer flashes green/red immediately and locks all
buttons for ANSWER_FEEDBACK_DELAY_MS before resolution.
================================================================ */
function getBeehiveTier(elapsedSec){
if(elapsedSec<=5.00) return {mult:2.00,label:'TIER 1 (FASTEST, <=5.00s): 2.00x MULTIPLIER ACTIVE!'};
if(elapsedSec<=10.00) return {mult:1.75,label:'TIER 2 (MEDIUM, 5.01-10.00s): 1.75x MULTIPLIER ACTIVE!'};
return {mult:1.50,label:'TIER 3 (STANDARD, >10.00s): 1.50x MULTIPLIER ACTIVE!'};
}

function getMultiplierHint(elapsed){
return getBeehiveTier(elapsed).label;
}

function calcBeehiveScore(elapsed){
var coins=G.coinsCollected;
var tier=getBeehiveTier(elapsed);
return Math.floor(tier.mult*10*coins);
}

function triggerBeehiveQuestion(){
if(G.isQuestion) return;
G.isQuestion=true; G.isBeehiveQuestion=true; G.beehiveElapsed=0;
ensureAudio(); sfxBeehive(); sfxAlarm();
if(G.beehiveQPool.length===0) buildBeehivePool();
askBeehive(G.beehiveQPool.shift());
}

function updatePlayerMovement(dt){
/* [J2] GROW_SPEED_MULT is exactly 1.15 (+15%). No friction/drag applied. */
var speed=PLAYER_MOVE_PX*(G.scaleMode==='grown'?GROW_SPEED_MULT:1.0);
var pxPerSec=speed*60;
if(G.fwdHeld) P.x+=pxPerSec*dt;
if(P.x<PLAYER_MIN_X) P.x=PLAYER_MIN_X;
if(P.x>PLAYER_MAX_X) P.x=PLAYER_MAX_X;
}

function updatePlayerPhysics(dt){
if(P.dropTimer>0) P.dropTimer-=dt;
var wasGrounded=P.onGround||P.onPlatform;
P.vy+=GRAVITY*60*dt;
P.y+=P.vy*60*dt;
var newOnPlatform=false,newPlat=null;
if(P.dropTimer<=0){
for(var i=0;i<platforms.length;i++){
var pl=platforms[i];
var cx=P.x+P.w/2;
var prevY=P.y-P.vy*60*dt;
if(cx>pl.x&&cx<pl.x+pl.w&&P.vy>=0&&P.y>=pl.y&&prevY<=pl.y+8){
newOnPlatform=true; newPlat=pl; break;
}
}
}
if(newOnPlatform){
P.y=Math.round(newPlat.y); P.vy=0; P.onPlatform=true; P.currentPlat=newPlat; P.onGround=false;
} else if(P.y>=GROUND_Y){
P.y=Math.round(GROUND_Y); P.vy=0; P.onGround=true; P.onPlatform=false; P.currentPlat=null;
} else {
P.onGround=false; P.onPlatform=false; P.currentPlat=null;
}
var nowGrounded=P.onGround||P.onPlatform;
if(nowGrounded&&!wasGrounded&&G.wasAirborne){ emitLandingShockwave(); }
G.wasAirborne=!nowGrounded;
}

/* [J7] World scroll strictly gated behind forward-hold */
function updateWorldScroll(dt){
if(!G.fwdHeld) return;
var pxPerSec=WORLD_SPEED_MPS*PX_PER_METER;
G.scrollX+=pxPerSec*dt;
G.distance=Math.min(TOTAL_DIST,G.scrollX/PX_PER_METER);
}

/* [J8] Microbe leftward drift: always active, independent of forward-hold */
function updateMicrobeDrift(dt){
for(var i=0;i<microbes.length;i++){
var m=microbes[i]; if(!m.alive) continue;
m.worldX-=m.vx*dt;
}
}

function updateScaleMode(dt){
if(G.scaleMode!=='normal'){
G.scaleT-=dt;
if(G.scaleT<=0){ G.scaleMode='normal'; G.scaleT=0; }
}
if(G.invulnT>0) G.invulnT-=dt;
if(G.microbeInvulnT>0) G.microbeInvulnT-=dt; /* [K1] dedicated microbe i-frame countdown */
}

function damagePlayer(){
if(G.invulnT>0) return;
G.hearts--; G.invulnT=1.4; sfxHit(); addParticles(P.x+P.w/2,P.y-P.h/2,'#ff5040',10);
if(G.hearts<=0){ G.hearts=0; triggerRevivalQuestion(); }
}

/* [K1] Dedicated microbe damage path. Kept distinct from the generic
damagePlayer() hazard path so the exact 500ms flashing invincibility
window requirement is met independently of the longer 1.4s hazard
invuln window, while still sharing the same heart-reduction and
revival-trigger behavior. */
function damagePlayerFromMicrobe(){
if(G.invulnT>0||G.microbeInvulnT>0) return;
G.hearts--; G.microbeInvulnT=MICROBE_HIT_INVULN_MS/1000; sfxHit();
addParticles(P.x+P.w/2,P.y-P.h/2,'#ff5040',10);
if(G.hearts<=0){ G.hearts=0; triggerRevivalQuestion(); }
}

/* [K1] Explicit, dedicated AABB collision sweep between the mascot
and every live microbe. Runs every frame regardless of laser timing
so an un-blasted microbe reliably registers exactly one hit the
instant its bounding box overlaps the mascot's bounding box. */
function checkMicrobeMascotCollisions(){
if(G.isQuestion||G.finishing||!G.running) return;
var scaleNow=G.scaleMode==='grown'?GROW_SCALE:(G.scaleMode==='shrunk'?SHRINK_SCALE:1.0);
var effW=P.w*scaleNow, effH=P.h*scaleNow;
var effX=P.x+P.w/2-effW/2, effY=P.y-effH;
for(var i=0;i<microbes.length;i++){
var m=microbes[i]; if(!m||!m.alive) continue;
var mx=m.x-m.w/2, my=m.y-m.h/2;
if(rr(effX,effY,effW,effH,mx,my,m.w,m.h)){
m.alive=false;
addParticles(m.x,m.y,m.color.core,10);
addFloat(m.x,m.y-6,'HIT!','#ff5040',13);
damagePlayerFromMicrobe();
}
}
}

function checkCollisions(){
if(G.isQuestion||G.finishing||!G.running) return;
/* [J2/J3] Effective collision rect uses exact GROW_SCALE (1.5x) / SHRINK_SCALE (0.75x) */
var scaleNow=G.scaleMode==='grown'?GROW_SCALE:(G.scaleMode==='shrunk'?SHRINK_SCALE:1.0);
var effW=P.w*scaleNow, effH=P.h*scaleNow;
var effX=P.x+P.w/2-effW/2, effY=P.y-effH;
var i;
for(i=0;i<diamonds.length;i++){
var d=diamonds[i]; if(d.taken) continue;
if(rr(effX,effY,effW,effH,d.x-d.r,d.y-d.r,d.r*2,d.r*2)){
d.taken=true; G.diamondsCollected++; G.score+=25; sfxDiamondChime();
addFloat(d.x,d.y-10,'+25',d.color,14); addParticles(d.x,d.y,d.color,8);
}
}
for(i=0;i<goldCoins.length;i++){
var c=goldCoins[i]; if(c.taken) continue;
if(rr(effX,effY,effW,effH,c.x-c.r,c.y-c.r,c.r*2,c.r*2)){
c.taken=true; G.coinsCollected++; G.score+=10; sfxCoinRing();
addFloat(c.x,c.y-10,'+10','#ffd040',13);
}
}
for(i=0;i<powerups.length;i++){
var p=powerups[i]; if(p.taken) continue;
if(rr(effX,effY,effW,effH,p.x,p.y,p.w,p.h)){
p.taken=true;
if(p.type==='apple'){ G.hearts=Math.min(G.maxHearts,G.hearts+1); G.score+=15; sfxPowerup(); addFloat(p.x+p.w/2,p.y-6,'+1 HP','#ff6050',14); }
/* [J2] Accelerator Growth: 1.15x speed, 1.5x sprite height */
else if(p.type==='grow'){ G.scaleMode='grown'; G.scaleT=8; sfxGrowth(); addFloat(p.x+p.w/2,p.y-6,'GROWTH +15% SPEED','#ffc060',13); }
/* [J3] Shrink: 0.75x baseline size */
else if(p.type==='shrink'){ G.scaleMode='shrunk'; G.scaleT=8; sfxShrink(); addFloat(p.x+p.w/2,p.y-6,'SHRINK 0.75x','#80c8ff',13); }
}
}
/* [K3] Letter pickup: chime + dashboard tick only, ZERO points
awarded at collection time. Full valuation happens at the 2500m
win-state via the end-game letter economy calculator. */
for(i=0;i<letterCrates.length;i++){
var lc=letterCrates[i]; if(lc.letterCollected) continue;
if(!lc.opened){
if(rr(effX,effY,effW,effH,lc.x,lc.y,lc.w,lc.h)){ lc.opened=true; lc.openStartTime=performance.now()/1000; sfxLetter(); }
} else {
if(performance.now()/1000-lc.openStartTime>=0.4){
lc.letterCollected=true; G.lettersCollected.add(lc.slotIndex); popTracker(lc.slotIndex);
addFloat(lc.x+lc.w/2,lc.y-30,'COLLECTED','#ffc820',14);
if(G.lettersCollected.size>=PHRASE_LETTERS.length&&!G.phraseComplete){
G.phraseComplete=true; sfxPhraseComplete();
addFloat(P.x+P.w/2,P.y-P.h-40,'FULL PHRASE - VALUE AT FINISH!','#ffe070',15);
}
}
}
}
for(i=0;i<spikedLogs.length;i++){
var sl=spikedLogs[i]; if(sl.passed) continue;
if(rr(effX,effY,effW,effH,sl.x,sl.y-sl.h,sl.w,sl.h)){ sl.passed=true; sfxSpike(); damagePlayer(); }
}
for(i=0;i<carniPlants.length;i++){
var cp=carniPlants[i]; if(!cp.alive) continue;
if(rr(effX,effY,effW,effH,cp.x,cp.y-cp.h,cp.w,cp.h)){ cp.alive=false; cp.snapAnim=1; sfxPlantSnap(); damagePlayer(); }
}
for(i=0;i<beehives.length;i++){
var bh=beehives[i]; if(bh.triggered) continue;
if(rr(effX,effY,effW,effH,bh.x,bh.y-bh.h/2,bh.w,bh.h)){ bh.triggered=true; triggerBeehiveQuestion(); }
}
/* [K1] Dedicated microbe-vs-mascot sweep runs every frame here,
independent of laser resolution order, fixing the bypass bug. */
checkMicrobeMascotCollisions();
}

function updateLasers(dt){
for(var i=lasers.length-1;i>=0;i--){
var l=lasers[i];
if(l.homing&&l.target&&l.target.alive){
var dx=l.target.x-l.x,dy=l.target.y-l.y,dist=Math.max(1,Math.hypot(dx,dy));
l.vx=(dx/dist)*22; l.vy=(dy/dist)*22;
}
l.x+=l.vx*60*dt; l.y+=l.vy*60*dt;
var hit=false;
for(var j=0;j<microbes.length;j++){
var m=microbes[j]; if(!m.alive) continue;
if(Math.hypot(m.x-l.x,m.y-l.y)<m.r+8){
m.alive=false; hit=true; sfxMicrobePop(); G.score+=5;
addParticles(m.x,m.y,m.color.core,8); addFloat(m.x,m.y,'+5','#ff9d50',12);
break;
}
}
if(hit||l.x>BW+60||l.x<-60) lasers.splice(i,1);
}
}

function periodicCompact(){
G.trackTimer++;
if(G.trackTimer%30!==0) return;
var minX=-CULL_MARGIN*2;
compact(diamonds,function(d){ return !d.taken&&d.x>minX; });
compact(goldCoins,function(c){ return !c.taken&&c.x>minX; });
compact(powerups,function(p){ return !p.taken&&p.x>minX; });
compact(microbes,function(m){ return m.alive&&m.x>minX; });
compact(letterCrates,function(l){ return !l.letterCollected&&l.x>minX-200; });
compact(spikedLogs,function(s){ return !s.passed&&s.x>minX; });
compact(carniPlants,function(c){ return c.alive&&c.x>minX; });
compact(beehives,function(b){ return !b.triggered&&b.x>minX; });
compact(platforms,function(p){ return p.x>minX-300; });
}

function update(dt){
if(Math.random()<0.2){

pollen.push({

x:Math.random()*BW,

y:BH,

phase:Math.random()*6,

size:0.5+Math.random(),

life:8

});
}

for(var pp=pollen.length-1; pp>=0; pp--){
    var p=pollen[pp];
    p.life -= dt;
    p.y -= 15*dt;
    if(p.life <= 0) pollen.splice(pp, 1);
}

safe(function(){
if(!G.running) return;
if(G.finishing){
G.finishTimer-=dt;
updateParticles(dt); updateFloatingTexts(dt); updateDustPool(dt,0);
for(var pp=pollen.length-1;pp>=0;pp--){

var p=pollen[pp];

p.life-=dt;

p.y-=15*dt;

if(p.life<=0)
pollen.splice(pp,1);
}

if(G.finishTimer<=0){ G.finishing=false; G.running=false; showVictory(); }
return;
}
if(G.isQuestion) return;
updateWorldScroll(dt);
updatePlayerMovement(dt);
updatePlayerPhysics(dt);
updateScaleMode(dt);
updateSpawning();
updateMicrobeDrift(dt);
refreshWorldPositions();
checkCollisions();
updateLasers(dt);
updateCanopyBirds(dt,G.fwdHeld?(WORLD_SPEED_MPS*PX_PER_METER):0);
updateDustPool(dt,G.fwdHeld?(WORLD_SPEED_MPS*PX_PER_METER*dt):0);
if((P.onGround||P.onPlatform)&&G.fwdHeld&&Math.random()<0.6) emitRunDust();
updateFloatingTexts(dt);
updateParticles(dt);
periodicCompact();
checkCheckpoints();
/* THE FIX: Trigger the ending slightly early so players don't get stuck if they let go of the FWD button */
if(!G.finishing && G.distance >= TOTAL_DIST - 10){ startFinish(); }
});
}

/* ================================================================
RENDER
================================================================ */
function updateHUD(){
safe(function(){
document.getElementById('hudLeft').textContent='HP: '+G.hearts+'/'+G.maxHearts;
document.getElementById('hudMid').textContent=Math.floor(G.distance)+' / '+TOTAL_DIST+' m';
document.getElementById('hudRight').textContent='SCORE '+Math.floor(G.score+0);
document.getElementById('hcCoins').textContent='COIN '+G.coinsCollected+'/'+TOTAL_COINS;
document.getElementById('hcDiamonds').textContent='GEM '+G.diamondsCollected+'/'+TOTAL_DIAMONDS;
updateTracker();
});
}

function render(){
safe(function(){
ctx.save(); applyVirtualScale();
drawBackground();
drawCanopyBirds();
var i;
for(i=0;i<platforms.length;i++) drawPlatform(platforms[i]);
for(i=0;i<beehives.length;i++) drawBeehive(beehives[i]);
for(i=0;i<carniPlants.length;i++) drawCarniPlant(carniPlants[i]);
for(i=0;i<spikedLogs.length;i++) drawSpikedLog(spikedLogs[i]);
for(i=0;i<letterCrates.length;i++) drawLetterCrate(letterCrates[i]);
for(i=0;i<powerups.length;i++) drawPowerup(powerups[i]);
for(i=0;i<goldCoins.length;i++) drawGoldCoin(goldCoins[i]);
for(i=0;i<diamonds.length;i++) drawDiamond(diamonds[i]);
for(i=0;i<microbes.length;i++) drawMicrobe(microbes[i]);
drawDustPool();
drawPlayer();
for(i=0;i<lasers.length;i++) drawLaser(lasers[i]);
var pt=performance.now()/1000;

for(var pp=0;pp<pollen.length;pp++){

var p=pollen[pp];

ctx.fillStyle=
'rgba(255,190,80,'+
(0.3+0.7*Math.abs(
Math.sin(pt*2+p.phase)
))
+')';

ctx.beginPath();

ctx.arc(
p.x+Math.sin(pt+p.phase)*8,
p.y,
p.size,
0,
Math.PI*2
);

ctx.fill();
}

drawParticles();
drawFloatingTexts();
ctx.restore();
});
updateHUD();
}

/* ================================================================
MAIN LOOP / LIFECYCLE
================================================================ */
var fpsBannerEl=null,fpsAccum=0,fpsFrames=0,fpsLastUpdate=0;

function gameLoop(now){
if(!G.running) return;
safe(function(){
var dt=Math.min(0.05,(now-(G.lastTime||now))/1000);
G.lastTime=now;
update(dt);
render();
fpsFrames++;
if(now-fpsLastUpdate>500){
if(!fpsBannerEl) fpsBannerEl=document.getElementById('fpsBanner');
var fps=Math.round(fpsFrames*1000/Math.max(1,now-fpsLastUpdate));
if(fpsBannerEl) fpsBannerEl.textContent=fps+' fps';
fpsFrames=0; fpsLastUpdate=now;
}
});
if(G.running) requestAnimationFrame(gameLoop);
}

function startGame(){
safe(function(){
buildTracker();
G.running=true; G.phase='running'; G.lastTime=performance.now();
requestAnimationFrame(gameLoop);
});
}

function startFinish(){
if(G.finishing) return;
G.finishing=true; G.finishTimer=2.0; ensureAudio(); sfxCrownChime();
}

function buildPartialPhrase(){
var out='';
for(var i=0;i<PHRASE_LETTERS.length;i++) out+=G.lettersCollected.has(i)?PHRASE_LETTERS[i]:'_';
return out;
}

/* [K3] End-game letter economy calculator: each collected letter is
worth exactly LETTER_POINT_VALUE (100) points, totalled here and
folded into the final score only at the win-state. */
function calcLetterEconomyTotal(){
return G.lettersCollected.size*LETTER_POINT_VALUE;
}

/* [K3] Single source of truth for applying the letter-economy bonus
to G.score. Idempotent via G.letterEconomyApplied -- safe to call
from the in-flight victory-animation timer AND from the skip button,
whichever happens first, without ever double-counting or losing the
bonus. Returns the total that is (or already was) applied. */
function awardLetterEconomyOnce(){
var total=calcLetterEconomyTotal();
if(!G.letterEconomyApplied){
G.letterEconomyApplied=true;
G.score+=total;
if(total>0) sfxPhraseComplete();
}
return total;
}

function populateLetterBreakdown(){
safe(function(){
var grid=document.getElementById('letterBreakdownGrid');
grid.innerHTML='';
for(var i=0;i<PHRASE_LETTERS.length;i++){
var got=G.lettersCollected.has(i);
var chip=document.createElement('span');
chip.className='lbChip '+(got?'got':'missing');
chip.textContent=PHRASE_LETTERS[i];
grid.appendChild(chip);
}
var total=calcLetterEconomyTotal();
document.getElementById('letterBreakdownTotal').textContent=
G.lettersCollected.size+' / '+PHRASE_LETTERS.length+' LETTERS x '+LETTER_POINT_VALUE+' PTS = +'+total+' PTS'+(G.phraseComplete?'  (FULL PHRASE!)':'');
});
}

function populateEndScreen(){
    safe(function(){
        // 1. Grab all the scores and username
        var r2Score = Math.floor(G.score);
        var r1Score = parseInt(localStorage.getItem('round1Score')) || 0;
        var uname = localStorage.getItem('username') || 'Player';
        var totalScore = r1Score + r2Score;

        var yieldPct=Math.round(((G.coinsCollected/TOTAL_COINS)+(G.diamondsCollected/TOTAL_DIAMONDS))/2*100);

        // 2. Build the Grand Finale Scoreboard
        document.getElementById('fScore').innerHTML = 
            'PLAYER: ' + uname + '<br>' +
            'ROUND 1: ' + r1Score + ' PTS<br>' +
            'ROUND 2: ' + r2Score + ' PTS<br>' +
            '<br><span style="color:#40ff90; font-size:24px; text-shadow:0 0 10px rgba(60,255,140,0.8);">GRAND TOTAL: ' + totalScore + ' PTS</span>';
        
        document.getElementById('fCoins').textContent='COINS: '+G.coinsCollected+' / '+TOTAL_COINS;
        document.getElementById('fDiamonds').textContent='GEMS: '+G.diamondsCollected+' / '+TOTAL_DIAMONDS;
        document.getElementById('fYield').textContent='COLLECTION YIELD: '+yieldPct+'%';
        populateLetterBreakdown();
        document.getElementById('phraseReveal').textContent=G.phraseComplete?TARGET_PHRASE:buildPartialPhrase();
        
        // 3. Silently Send Data to Google Sheets
        if(GOOGLE_SHEET_URL !== "PASTE_YOUR_WEB_APP_URL_HERE") {
	    // Grab the exact time the player finished the game
    	    var finishTime = new Date().toLocaleString();
            fetch(GOOGLE_SHEET_URL, {
                method: "POST",
		mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
	            timestamp: finishTime,
                    username: uname,
                    round1Score: r1Score,
                    round2Score: r2Score,
                    totalScore: totalScore
                })
            }).catch(function(e){ console.error("Sheet Error: ", e); });
        }

        document.getElementById('endScreen').style.display='flex';
    });
}

/* [J1] Victory overlay rebranded.
[K3] The letter-economy total is now applied to the score and flashed
explicitly during this cyclone/victory animation, before the player
reaches the final results screen. */
var victoryAnimStop = false;
function runVictoryAnim(){
    victoryAnimStop = false;
    var vCanvas = document.getElementById('victoryCanvas');
    var vctx = vCanvas.getContext('2d');
    vCanvas.width = 640; vCanvas.height = 360;
    var start = performance.now();
    var letterTotal = calcLetterEconomyTotal();

    /* Create the fake gems for the swirl effect */
    var swirlGems = [];
    for(var i=0; i<40; i++){
        swirlGems.push({
            angle: Math.random() * Math.PI * 2,
            dist: 200 + Math.random() * 150,
            speed: 2 + Math.random() * 3,
            color: DIAMOND_COLORS[i % DIAMOND_COLORS.length]
        });
    }

    function frame(now){
        if(victoryAnimStop) return;
        var t = (now - start) / 1000;
        
        /* Award points early in the animation so the total is ready */
        if(t >= 1.1){ awardLetterEconomyOnce(); }

        safe(function(){
            /* Dark cinematic background */
            var g = vctx.createLinearGradient(0, 0, 0, 360);
            g.addColorStop(0, '#1a0b2e'); g.addColorStop(0.5, '#4a154b'); g.addColorStop(1, '#8a3c3c');
            vctx.fillStyle = g; vctx.fillRect(0, 0, 640, 360);

            var cx = 320, cy = 200;

            /* PHASE 1: The Swirling Gemstones */
            if(t < 3.5) {
                var pull = Math.min(1, t / 2.5); // Pulls gems to the center over time
                for(var i=0; i<swirlGems.length; i++){
                    var gem = swirlGems[i];
                    var currentDist = gem.dist * (1 - Math.pow(pull, 2));
                    var currentAngle = gem.angle + t * gem.speed;
                    var gx = cx + Math.cos(currentAngle) * currentDist;
                    var gy = cy - 40 + Math.sin(currentAngle) * currentDist;

                    vctx.save();
                    vctx.translate(gx, gy); vctx.rotate(currentAngle);
                    vctx.fillStyle = gem.color;
                    vctx.shadowColor = gem.color; vctx.shadowBlur = 10;
                    vctx.beginPath(); vctx.moveTo(0,-8); vctx.lineTo(6,0); vctx.lineTo(0,8); vctx.lineTo(-6,0); vctx.fill();
                    vctx.restore();
                }
            }

            /* PHASE 2: The Crown Forms */
            var crownAlpha = 0;
            if(t > 2.5 && t < 4.5) crownAlpha = Math.min(1, (t - 2.5) * 2);
            if(t >= 4.5) crownAlpha = Math.max(0, 1 - (t - 4.5) * 2); // Fades out as door opens
            if(crownAlpha > 0) {
                vctx.save(); vctx.globalAlpha = crownAlpha;
                vctx.fillStyle = '#ffc820'; vctx.shadowColor = '#ffc820'; vctx.shadowBlur = 25;
                vctx.beginPath();
                vctx.moveTo(cx - 30, cy - 10); vctx.lineTo(cx - 40, cy - 40); vctx.lineTo(cx - 15, cy - 20);
                vctx.lineTo(cx, cy - 50); vctx.lineTo(cx + 15, cy - 20); vctx.lineTo(cx + 40, cy - 40);
                vctx.lineTo(cx + 30, cy - 10); vctx.fill();
                vctx.restore();
            }

            /* PHASE 3: The Door Opens & Black Figure Appears */
            var doorAlpha = 0;
            if(t > 4.0) doorAlpha = Math.min(1, (t - 4.0));
            if(doorAlpha > 0) {
                vctx.save(); vctx.globalAlpha = doorAlpha;
                // Glowing Doorway
                vctx.shadowColor = '#e6ab7c'; vctx.shadowBlur = 40;
                vctx.fillStyle = '#fce6c8';
                vctx.fillRect(cx - 35, cy - 80, 70, 110);
                vctx.shadowBlur = 0;
                
                // Black Figure stepping out
                var walk = Math.min(1, (t - 4.5) * 0.4); // Scale up as it walks forward
                if(walk > 0) {
                    var figY = cy - 40 + (walk * 30);
                    vctx.fillStyle = '#000';
                    vctx.beginPath(); vctx.arc(cx, figY, 12 * (1 + walk), 0, Math.PI*2); vctx.fill(); // Head
                    vctx.fillRect(cx - 15 * (1 + walk), figY + 15 * (1 + walk), 30 * (1 + walk), 45 * (1 + walk)); // Body
                }
                vctx.restore();
            }

            /* PHASE 4: "JUMANJI ESCAPED" Text */
            if(t >= 6.0) {
                var textAlpha = Math.min(1, (t - 6.0));
                vctx.save(); vctx.globalAlpha = textAlpha;
                vctx.fillStyle = '#ff9d50';
                vctx.font = 'bold 36px Courier New'; vctx.textAlign = 'center';
                vctx.shadowColor = 'rgba(255,150,60,0.8)'; vctx.shadowBlur = 15;
                vctx.fillText('JUMANJI ESCAPED', cx, 80);

                vctx.font = 'bold 16px Courier New'; vctx.fillStyle = '#ffd030';
                vctx.shadowColor = 'rgba(255,200,0,0.85)'; vctx.shadowBlur = 12;
                vctx.fillText('LETTERS: ' + G.lettersCollected.size + ' / ' + PHRASE_LETTERS.length + '  x  ' + LETTER_POINT_VALUE + ' PTS', cx, 280);
                vctx.fillText('LETTER BONUS: +' + letterTotal + ' PTS', cx, 310);
                vctx.shadowBlur = 0;
                vctx.font = '12px Courier New'; vctx.fillStyle = 'rgba(255,225,190,0.85)';
                vctx.fillText('RUNNING TOTAL: ' + Math.floor(G.score), cx, 335);
                vctx.restore();
            }
        });

        if(t < 10.0 && !victoryAnimStop){ requestAnimationFrame(frame); }
        else if(!victoryAnimStop){ finishVictoryToEndScreen(); }
    }
    requestAnimationFrame(frame);
}
function finishVictoryToEndScreen(){
if(victoryAnimStop) return;
victoryAnimStop=true;
document.getElementById('victoryOverlay').style.display='none';
document.getElementById('victorySkip').style.display='none';
/* [K3] Guarantee the bonus has been applied even if the player skips
before the in-animation award fired at t>=1.1s. Idempotent, so this
never double-applies. */
awardLetterEconomyOnce();
populateEndScreen();
}

function showVictory(){
stopAmbient();
document.getElementById('victoryOverlay').style.display='flex';
document.getElementById('victorySkip').style.display='block';
runVictoryAnim();
}

document.getElementById('victorySkip').addEventListener('click',function(){
/* [K3] If skipped before the in-animation award fired, applying it
here guarantees the bonus is never lost; the idempotent guard means
it still only ever applies exactly once. */
awardLetterEconomyOnce();
finishVictoryToEndScreen();
});
var rBtn = document.getElementById('restartBtn');
rBtn.innerText = 'FINISH TOURNAMENT';
rBtn.addEventListener('click',function(){ 
    var finalName = localStorage.getItem('username') || "Player";
    alert("Tournament Complete! " + finalName + "'s score has been officially submitted to the committee.");
});

/* ================================================================
BOOTSTRAP
================================================================ */
resizeCanvas();
initPebbles();
initCanopyBirds();
buildRevivalPool();
buildBeehivePool();
runCinematic();

})();
</script>
